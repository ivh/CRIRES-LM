{% extends "base.html" %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:baseline;">
<h1>CRIRES+ L/M-band data browser</h1>
<span style="display:flex; gap:1rem;">
<a class="about-link" href="{{ base }}/flats">Flats</a>
<a class="about-link" href="{{ base }}/about">About</a>
</span>
</div>

<form class="filters" hx-get="{{ base }}/" hx-target="#results" hx-push-url="true" hx-trigger="change, search, keyup changed delay:300ms from:#q">
    <div>
        <label for="q">Search</label>
        <input type="search" name="q" id="q" placeholder="target, prog..." value="{{ sel_q or '' }}" autocomplete="off">
    </div>
    <div>
        <label for="object">Target</label>
        <select name="object" id="object">
            <option value="">All targets</option>
            {% for o in objects %}
            <option value="{{ o }}" {{ 'selected' if sel_object == o }}>{{ o }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="setting">Setting</label>
        <select name="setting" id="setting">
            <option value="">All settings</option>
            {% for s in settings %}
            <option value="{{ s }}" {{ 'selected' if sel_setting == s }}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="prog_id">Programme</label>
        <select name="prog_id" id="prog_id">
            <option value="">All programmes</option>
            {% for p in prog_ids %}
            <option value="{{ p }}" {{ 'selected' if sel_prog_id == p }}>{{ p }}</option>
            {% endfor %}
        </select>
    </div>
    <span class="count" id="count">{{ n_total }} observations</span>
</form>

<div id="results">
{% include "obs_table.html" %}
</div>
{% endblock %}
